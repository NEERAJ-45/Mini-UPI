name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Start Infrastructure (Postgres, Redis, Kafka)
      run: |
        docker compose up -d postgres redis kafka zookeeper
        docker compose ps

    # 🔥 Proper readiness check (critical improvement)
    - name: Wait for Postgres
      run: |
        until docker compose exec -T postgres pg_isready -U postgres; do
          echo "Waiting for Postgres..."
          sleep 2
        done

    - name: Wait for Redis
      run: |
        until docker compose exec -T redis redis-cli ping | grep PONG; do
          echo "Waiting for Redis..."
          sleep 2
        done

    - name: Wait for Kafka
      run: |
        sleep 20  # Kafka needs a bit more time (can be improved further)

    - name: Build and Verify with Maven
      run: ./mvnw clean verify -B

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/target/surefire-reports/'
        retention-days: 8 